<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Design Tokens — Gitma</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f5f5f5; color: #1a1a1a; }

  .app { display: grid; grid-template-columns: 240px 1fr; min-height: 100vh; }

  /* Sidebar */
  .sidebar { background: #fff; border-right: 1px solid #e5e5e5; padding: 20px; display: flex; flex-direction: column; height: 100vh; position: sticky; top: 0; overflow-y: auto; }
  .sidebar h1 { font-size: 16px; margin-bottom: 2px; }
  .sidebar .subtitle { font-size: 11px; color: #999; margin-bottom: 16px; }
  .search { width: 100%; padding: 7px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 12px; outline: none; margin-bottom: 16px; }
  .search:focus { border-color: #999; }
  .divider { border: none; border-top: 1px solid #eee; margin: 12px 0; }
  .mode-toggle { display: flex; gap: 2px; margin-bottom: 16px; background: #f0f0f0; border-radius: 6px; padding: 2px; }
  .mode-btn { flex: 1; padding: 5px; text-align: center; font-size: 11px; border: none; background: transparent; border-radius: 4px; cursor: pointer; color: #666; transition: all 0.15s; }
  .mode-btn.active { background: #fff; color: #1a1a1a; box-shadow: 0 1px 2px rgba(0,0,0,0.08); }
  .cat-section { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; padding: 8px 0 4px; }
  .cat-item { padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; color: #444; transition: all 0.15s; display: flex; align-items: center; justify-content: space-between; }
  .cat-item:hover { background: #f5f5f5; }
  .cat-item.active { background: #1a1a1a; color: #fff; }
  .cat-count { font-size: 10px; color: #999; }
  .cat-item.active .cat-count { color: #888; }
  .powered { margin-top: auto; padding-top: 16px; border-top: 1px solid #eee; text-align: center; }
  .powered a { font-size: 10px; color: #999; text-decoration: none; letter-spacing: 0.03em; }
  .powered a:hover { color: #666; }
  .powered a span { font-weight: 600; color: #666; }
  .powered a:hover span { color: #1a1a1a; }

  /* Main */
  .main { padding: 32px; overflow-y: auto; }
  .main-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 8px; }
  .main-header h2 { font-size: 18px; }
  .main-header .count { font-size: 12px; color: #999; }
  .main-desc { font-size: 12px; color: #999; margin-bottom: 24px; }

  /* Token grid */
  .token-grid { display: flex; flex-direction: column; gap: 1px; background: #eee; border-radius: 8px; overflow: hidden; }
  .token-row { display: grid; grid-template-columns: 1fr 140px 140px 40px; align-items: center; padding: 10px 16px; background: #fff; gap: 12px; }
  .token-row.header { background: #fafafa; position: sticky; top: 0; z-index: 1; }
  .token-row.header span { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; color: #999; }
  .token-name { font-family: monospace; font-size: 12px; color: #1a1a1a; }
  .token-path { font-size: 10px; color: #999; margin-top: 1px; }
  .token-desc { font-size: 10px; color: #7c3aed; margin-top: 2px; font-style: italic; }
  .token-value { font-family: monospace; font-size: 11px; display: flex; align-items: center; gap: 6px; }
  .token-swatch { width: 24px; height: 24px; border-radius: 4px; border: 1px solid rgba(0,0,0,0.08); flex-shrink: 0; }
  .token-hex { color: #555; }
  .token-float { color: #555; }
  .token-copy { width: 28px; height: 28px; display: flex; align-items: center; justify-content: center; border: none; background: transparent; cursor: pointer; border-radius: 4px; color: #ccc; transition: all 0.15s; }
  .token-copy:hover { background: #f0f0f0; color: #666; }
  .token-copy.copied { color: #4ade80; }
  .token-copy svg { width: 14px; height: 14px; }

  /* Color scale */
  .color-scale { display: flex; gap: 1px; border-radius: 8px; overflow: hidden; margin-bottom: 24px; }
  .color-scale-item { flex: 1; height: 48px; position: relative; cursor: pointer; transition: transform 0.15s; }
  .color-scale-item:hover { transform: scaleY(1.15); z-index: 1; }
  .color-scale-label { position: absolute; bottom: 4px; left: 0; right: 0; text-align: center; font-size: 8px; font-weight: 600; opacity: 0; transition: opacity 0.15s; }
  .color-scale-item:hover .color-scale-label { opacity: 1; }

  /* Spacing/radius visual */
  .dimension-bar { height: 8px; background: #1a1a1a; border-radius: 2px; min-width: 2px; transition: width 0.2s; }

  /* Empty state */
  .empty { text-align: center; padding: 48px; color: #999; }
  .empty h3 { font-size: 16px; color: #333; margin-bottom: 4px; }

  /* Stats bar */
  .stats { display: flex; gap: 16px; margin-bottom: 24px; }
  .stat { background: #fff; border-radius: 8px; padding: 12px 16px; flex: 1; }
  .stat-value { font-size: 20px; font-weight: 600; }
  .stat-label { font-size: 10px; color: #999; text-transform: uppercase; letter-spacing: 0.04em; }
</style>
</head>

  </aside>

</div>

let currentMode = "Light";
let currentCategory = null;
let searchQuery = "";

// Flatten all tokens for counting
function getAllTokens() {
  const all = [];
  for (const [colName, col] of Object.entries(data)) {
    for (const [catName, tokens] of Object.entries(col.categories)) {
      for (const t of tokens) all.push({ ...t, collection: colName, category: catName });
    }
  }
  return all;
}

function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll(".mode-btn").forEach(b => {
    b.classList.toggle("active", b.textContent === mode);
  });
  render();
}

function filterTokens() {
  searchQuery = document.getElementById("search").value.toLowerCase();
  render();
}

function selectCategory(cat) {
  currentCategory = currentCategory === cat ? null : cat;
  render();
}

function renderSidebar() {
  let html = "";
  for (const [colName, col] of Object.entries(data)) {
    html += `<div class="cat-section">${colName}</div>`;
    for (const [catName, tokens] of Object.entries(col.categories)) {
      const isActive = currentCategory === colName + "/" + catName;
      html += `<div class="cat-item${isActive ? " active" : ""}" onclick="selectCategory('${colName}/${catName}')">
        <span>${catName}</span><span class="cat-count">${tokens.length}</span>
      </div>`;
    }
  }
  document.getElementById("categories").innerHTML = html;
}

function renderMain() {
  let tokens = getAllTokens();

  // Filter by category
  if (currentCategory) {
    const [col, cat] = currentCategory.split("/");
    tokens = tokens.filter(t => t.collection === col && t.category === cat);
  }

  // Filter by search
  if (searchQuery) {
    tokens = tokens.filter(t => t.fullName.toLowerCase().includes(searchQuery) || t.name.toLowerCase().includes(searchQuery));
  }

  const colors = tokens.filter(t => t.resolvedType === "COLOR");
  const floats = tokens.filter(t => t.resolvedType === "FLOAT");

  // Stats
  let html = `<div class="stats">
    <div class="stat"><div class="stat-value">${tokens.length}</div><div class="stat-label">Tokens</div></div>
    <div class="stat"><div class="stat-value">${colors.length}</div><div class="stat-label">Colors</div></div>
    <div class="stat"><div class="stat-value">${floats.length}</div><div class="stat-label">Numbers</div></div>
  </div>`;

  // Color scale if viewing a single color category
  if (currentCategory && colors.length > 2 && colors.length === tokens.length) {
    html += `<div class="color-scale">`;
    for (const t of colors) {
      const v = t.values[currentMode];
      if (v?.hex) {
        const textColor = isLight(v.hex) ? "#000" : "#fff";
        html += `<div class="color-scale-item" style="background:${v.hex}" title="${t.fullName}: ${v.hex}">
          <div class="color-scale-label" style="color:${textColor}">${t.name}</div>
        </div>`;
      }
    }
    html += `</div>`;
  }

  // Token list
  if (tokens.length === 0) {
    html += `<div class="empty"><h3>No tokens found</h3><p>Try a different search or category.</p></div>`;
  } else {
    html += `<div class="token-grid">`;
    html += `<div class="token-row header"><span>Token</span><span>${currentMode}</span><span>${currentMode === "Light" ? "Dark" : "Light"}</span><span></span></div>`;

    for (const t of tokens) {
      const v1 = t.values[currentMode];
      const v2 = t.values[currentMode === "Light" ? "Dark" : "Light"];
      html += `<div class="token-row">`;
      // Name
      html += `<div><div class="token-name">${t.name}</div><div class="token-path">${t.fullName}</div>${t.description ? `<div class="token-desc">${t.description}</div>` : ""}</div>`;
      // Value 1
      html += renderValue(v1);
      // Value 2
      html += renderValue(v2);
      // Copy
      html += `<button class="token-copy" onclick="copyToken(this, '${t.fullName}')" title="Copy token path"><svg><use href="#icon-copy"/></svg></button>`;
      html += `</div>`;
    }
    html += `</div>`;
  }

  document.getElementById("main").innerHTML = html;
}

function renderValue(v) {
  if (!v) return `<div class="token-value">—</div>`;
  if (v.type === "COLOR") {
    return `<div class="token-value"><span class="token-swatch" style="background:${v.hex}"></span><span class="token-hex">${v.hex}</span></div>`;
  }
  if (v.type === "FLOAT") {
    const maxBar = 120;
    const barW = Math.min(v.value, maxBar);
    return `<div class="token-value"><span class="token-float">${v.value}${v.value <= 384 && v.value > 0 ? "px" : ""}</span></div>`;
  }
  if (v.type === "ALIAS") {
    return `<div class="token-value"><span style="color:#7c3aed;font-size:10px;">→ ${v.ref}</span></div>`;
  }
  return `<div class="token-value">${JSON.stringify(v.value)}</div>`;
}

function isLight(hex) {
  const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
  return (r*299 + g*587 + b*114) / 1000 > 128;
}

function copyToken(btn, path) {
  navigator.clipboard.writeText(path).then(() => {
    btn.classList.add("copied");
    setTimeout(() => btn.classList.remove("copied"), 1200);
  });
}

function render() {
  renderSidebar();
  renderMain();
}

render();
</script>
